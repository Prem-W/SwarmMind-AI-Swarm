version: "3.8"

services:
  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    container_name: swarmmind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swarmmind}
      POSTGRES_USER: ${POSTGRES_USER:-swarmmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swarmmind_secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swarmmind}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - swarmmind-network

  # --- Redis Cache & Message Broker ---
  redis:
    image: redis:7-alpine
    container_name: swarmmind-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - swarmmind-network

  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: swarmmind-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - swarmmind-network

  # --- Backend API ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swarmmind-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://swarmmind:${POSTGRES_PASSWORD:-swarmmind_secure_password}@postgres:5432/swarmmind
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-gpt-4o}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - swarmmind-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Celery Worker ---
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swarmmind-celery
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DATABASE_URL=postgresql+asyncpg://swarmmind:${POSTGRES_PASSWORD:-swarmmind_secure_password}@postgres:5432/swarmmind
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - swarmmind-network
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  # --- Celery Beat (Scheduler) ---
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swarmmind-beat
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://swarmmind:${POSTGRES_PASSWORD:-swarmmind_secure_password}@postgres:5432/swarmmind
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - swarmmind-network
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  swarmmind-network:
    driver: bridge
